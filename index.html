<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ─── HERO SECTION ─── */
    .hero {
      position: relative;
      width: 100%;
      height: 520px;
      background: #111; /* fallback if no image */
    }

    /* 
      ================================================
      📸 ADD YOUR PHOTO HERE
      Replace the background-image URL below with your 
      own photo. You can use an online image URL or a 
      base64 encoded image.
      
      Example:
        background-image: url('https://your-image-url.com/photo.jpg');
      
      Tips:
      - Use a professional headshot with a dark background
      - Portrait orientation works best
      - The image will be cropped to fill the hero area
      ================================================
    */

    .hero-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;

      /* ← REPLACE THIS SRC WITH YOUR PHOTO */
      /* <img> tag is below in the HTML — update the src attribute there */
    }

    /* Dark gradient overlay so text is readable */
    .hero-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65%;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(0,0,0,0.5) 40%,
        rgba(0,0,0,0.92) 75%,
        #000 100%
      );
    }

    /* ─── PROFILE INFO (overlaid on hero) ─── */
    .profile-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 24px 28px;
      text-align: center;
    }

    .profile-name {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1.1;
      margin-bottom: 4px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    /* 
      ================================================
      🏷️ YOUR USERNAME / HANDLE
      Update the @handle below to match your social
      media username or preferred display handle.
      ================================================
    */
    .profile-handle {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.2px;
      margin-bottom: 18px;
    }

    /* ─── SOCIAL ICONS ROW ─── */
    .social-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-bottom: 0;
    }

    .social-icon {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
    }

    .social-icon:hover {
      opacity: 0.75;
      transform: scale(1.1);
    }

    .social-icon svg {
      width: 26px;
      height: 26px;
      fill: #fff;
    }

    /* ─── TAGLINE BELOW HERO ─── */
    .tagline {
      background: #000;
      padding: 18px 24px 8px;
      text-align: center;
    }

    /* 
      ================================================
      ✏️ YOUR BIO / TAGLINE
      Update the text inside .tagline-text below.
      This appears just below your photo section.
      Keep it short and punchy — 1 or 2 lines max.
      ================================================
    */
    .tagline-text {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255,255,255,0.80);
      line-height: 1.6;
    }

    /* ─── LINK CARDS SECTION ─── */
    .cards-section {
      background: #000;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      border-radius: 18px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
      text-decoration: none;
      display: block;
      position: relative;
    }

    .card:hover {
      transform: scale(0.985);
      opacity: 0.9;
    }

    /* Card with full-width banner image */
    .card-banner {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    /* Overlay label at bottom of each card */
    .card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      padding: 28px 18px 16px;
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      letter-spacing: 0.1px;
    }

    /* Light card variant (like the DoD card in the reference) */
    .card-light {
      background: #e0e0e0;
    }

    .card-light .card-label {
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      color: #fff;
    }

    /* Card with logo badge in corner */
    .card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 36px;
      height: 36px;
      background: #000;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-badge-text {
      font-size: 9px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* Solid color card (no image) */
    .card-solid {
      height: 80px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      background: #1a1a1a;
    }

    .card-solid-label {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.2px;
    }

    /* ─── FOOTER ─── */
    .footer {
      background: #000;
      padding: 16px 24px 32px;
      text-align: center;
    }

    .footer-text {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      font-weight: 400;
    }
  </style>
</head>
